min_version = { soft = "2026.3.15" }

[tools]
node = "24.14.0"
pnpm = "10.33.0"

[env]
_.path = ["{{config_root}}/node_modules/.bin"]

[tasks.install]
description = "Install JS dependencies"
run = "pnpm install --frozen-lockfile"
sources = ["package.json", "pnpm-lock.yaml", "mise.toml"]
outputs = ["node_modules/.pnpm/lock.yaml"]

[tasks.dev]
description = "Start Astro dev server"
depends = ["install"]
run = "pnpm dev"

[tasks.build]
description = "Build the site"
depends = ["install"]
run = "pnpm build"

[tasks.lint]
description = "Lint source files"
depends = ["install"]
run = "pnpm lint"

[tasks."lint:fix"]
description = "Lint source files and apply safe fixes"
depends = ["install"]
run = "pnpm lint:fix"

[tasks.format]
description = "Format supported files with Prettier"
depends = ["install"]
run = "pnpm format"

[tasks."format:check"]
description = "Check formatting with Prettier"
depends = ["install"]
run = "pnpm format:check"

[tasks.preview]
description = "Preview the built site"
depends = ["build"]
run = "pnpm preview"
